<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    <style>
        /* Reset margins and set up a dark immersive background */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }

        /* Container scales to take up the full browser view window */
        .viewer-container {
            width: 100vw;
            height: 100vh;
        }

        /* Essential 3D element styling */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #111111;
            --poster-color: transparent;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            src="https://morris3dface.dannyjordan.uk/your-file.glb" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1"
            exposure="1"
            interaction-prompt="auto"
            alt="Interactive 3D Model">
        </model-viewer>
    </div>

</body>
</html>
