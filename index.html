<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            overflow: hidden;
        }

        .viewer-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        model-viewer {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #111111;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            src="https://morris3dface.dannyjordan.uk/morrisv2.glb" 
            camera-controls 
            auto-rotate
            environment-image="neutral"
            shadow-intensity="1"
            exposure="1"
            interaction-prompt="auto"
            alt="Interactive 3D Asset">
        </model-viewer>
    </div>

</body>
</html>
